"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """$directory$os$git_branch$git_status$nodejs$rust$golang$php$python$lua$bun$fill$localip$cmd_duration
$character"""


[os]
disabled = false
format = "[$symbol](#blue) "

[os.symbols]
Ubuntu  = "󰕈"
Artix   = "󰣇"
Arch    = "󰣇"
CachyOS = "󰣇"
Macos   = ""

[directory]
format            = "[$path](cyan) "
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = ""
format = "[$symbol $branch](bold purple) "

[git_status]
format     = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead      = "[⇡$count ](bold cyan)"
behind     = "[⇣$count ](bold cyan)"
diverged   = "[⇡$ahead_count⇣$behind_count ](bold cyan)"
staged     = "[+$count ](bold green)"
modified   = "[●$count ](bold yellow)"
untracked  = "[?$count ](bold white)"
deleted    = "[✘$count ](bold red)"
conflicted = "[⚡$count ](bold red)"

[nodejs]
style = 'blue'
symbol = ' '
format = "[$symbol$version ]($style)"

[bun]
symbol = "🥟 "
style = "magenta"
format = "[$symbol$version]($style)"

[rust]
style = 'orange'
symbol = ' '

[golang]
symbol = ""
format = "[$symbol $version](cyan) "

[php]
symbol = ""
format = "[$symbol $version](purple) "

[python]
style = 'teal'
symbol = ' '
format = "[$symbol$version($virtual_env)]($style) "
pyenv_version_name = false

[lua]
symbol = ' '

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](blue)"

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[ $duration]($style)'

[localip]
ssh_only = true
format = '@[$localipv4](bold red) '
disabled = false

[fill]
symbol = ' '
